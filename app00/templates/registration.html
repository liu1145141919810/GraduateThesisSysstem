<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="keywords" content="">
  <meta name="description" content="">
  <meta name="author" content="">
  <link rel="icon" href="/static/images/favicon.png" type="image/png">
  <title></title>
   <link href="/static/css/icons.css" rel="stylesheet">
    <link href="/static/css/bootstrap.min.css" rel="stylesheet">
    <link href="/static/css/style.css" rel="stylesheet">
    <link href="/static/css/responsive.css" rel="stylesheet">
    
    <!--[if lt IE 9]>
          <script src="js/html5shiv.min.js"></script>
          <script src="js/respond.min.js"></script>
    <![endif]-->

</head>

<body>

 <!--Start login Section-->
  <section class="login-section">
       <div class="container">
           <div class="row">
               <div class="login-wrapper">
                   <div class="login-inner">
                       
                       <div class="logo">
                         <img src="/static/images/logo-dark.png"  alt="logo"/>
                       </div>
                           
                           <h2 class="header-title text-center">Sign Up</h2>
                        <!-- 红色警告信息 -->
                           {% if error %}
                           <div class="alert alert-danger alert-dismissible fade in" role="alert">
                               <button type="button" class="close" data-dismiss="alert" aria-label="Close">
                                   <span aria-hidden="true">&times;</span>
                               </button>
                               <strong>错误！</strong> {{ error }}
                           </div>
                           {% endif %}
                       <form action="" method="post">
                            {% csrf_token %}
                           <div class="form-group">
                               <input type="text" class="form-control" name="email" placeholder="Email" required>
                           </div>
                           
                           <div class="form-group">
                               <input type="text" class="form-control" name="usr" placeholder="Username" required>
                           </div>

                           <div class="form-group">
                               <input type="password" class="form-control" name="pwd" placeholder="Password" required>
                           </div>

                        <div class="form-group">
                           <div class="pull-left">
                               <div class="checkbox primary">
                              <input id="checkbox-1" type="checkbox" name="accept_terms">
                              <label for="checkbox-1">I accept <a href="#">Terms and Conditions</a></label>
                            </div>
                           </div>
                         </div>
                          
                           <div class="form-group">
                               <input id="signup-btn" type="submit" value="Sign Up" class="btn btn-primary btn-block">
                           </div>
                           
                           <div class="form-group text-center">
                            Already have an account?  <a href="/login/">Sign In </a>
                           </div>
                           
                       </form>
                       
                        <div class="copy-text"> 
                         <p class="m-0">2017 &copy; Meter admin</p>
                        </div>
                    
                   </div>
               </div>
               
           </div>
       </div>
  </section>
 <!--End login Section-->

    <!--Begin core plugin -->
    <script src="/static/js/jquery.min.js"></script>
    <script src="/static/js/bootstrap.min.js"></script>
    <script src="/static/plugins/moment/moment.js"></script>
    <script src="/static/js/jquery.slimscroll.js"></script>
    <script src="/static/js/jquery.nicescroll.js"></script>
    <script src="/static/js/functions.js"></script>
    <!-- End core plugin -->
       
    <script>
    (function(){
      const checkbox = document.getElementById('checkbox-1');
      const btn = document.getElementById('signup-btn');
      
      if(!checkbox || !btn) {
        console.error('checkbox 或 btn 元素未找到');
        return;
      }
      
      function update() {
        btn.disabled = !checkbox.checked;
      }
      checkbox.addEventListener('change', update);
      // 初始化
      update();
    })();
    </script>
</body>

</html>
